name: Demonstration
on: push

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.0.0'
      - uses: oven-sh/setup-bun@v2
      - name: Setup C++ toolchain
        uses: aminya/setup-cpp@v1
        with:
          compiler: llvm
          cmake: true
          ninja: true
      - uses: docker/setup-buildx-action@v4
      - uses: grafana/setup-k6-action@v1
      - name: Install JS dependencies
        run: bun install

      - name: build HTTP test with Docker
        run: chmod +x ./demo/http/run.sh && bun run http:build
      - name: run HTTP test - NodeJS + Bun + Deno in constrained environment 
        run: bun run http:start

      - name: NodeJS's %ArrayBufferDetach vs .transfer(0)
        run: bun run detach-vs-transfer

      - name: Build gc-pressure Docker image
        run: bun run gc-pressure:build
      - name: GC pressure under memory-constrained environment
        run: bun run gc-pressure:start

      - name: Compile C++
        run: bun run cxx:fetch && bun run cxx:conf && bun run cxx:build
      - name: C++ addon — detach method comparison (V8 API vs NAPI)
        run: bun run cxx:start

name: Demonstration
on: push

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '25.0.0'
      - uses: oven-sh/setup-bun@v2
      - name: Setup C++ toolchain
        uses: aminya/setup-cpp@v1
        with:
          compiler: llvm
          cmake: true
          ninja: true
      - uses: docker/setup-buildx-action@v4
      - name: Install JS dependencies
        run: bun install
      - name: Compile C++
        run: bun run cxx:fetch && bun run cxx:conf && bun run cxx:build
      - name: Build gc-pressure Docker image
        run: bun run gc-pressure:build
      - name: NodeJS's %ArrayBufferDetach vs .transfer(0)
        run: bun run detach-vs-transfer
      - name: GC pressure under memory-constrained environment
        run: bun run gc-pressure:start
      - name: C++ addon — detach method comparison (V8 API vs NAPI)
        run: bun run cxx:start
